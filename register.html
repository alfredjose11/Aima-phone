<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as a Blood Donor — AIMA | SMYM Chirakkadavu</title>
    
    <!-- Premium Google Fonts Framework Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Core Vector Asset Icons Package CDN[cite: 8] -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ==========================================================================
           THEME STYLE SYSTEM CORE VARIABLES & ROOT METRICS[cite: 8]
           ========================================================================== */
        :root {
            --bg-dark: #050507;
            --card-bg: rgba(14, 14, 18, 0.55);
            --primary-red: #ff3b42;
            --primary-red-hover: #e02d34;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.55);
            --border-light: rgba(255, 255, 255, 0.06);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Visual Layers[cite: 8] */
        .static-image-backdrop {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2; background-color: #000;
        }
        .static-image-backdrop img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: right center;
        }
        .video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(5,5,7,0.5) 0%, rgba(5,5,7,0.3) 50%, rgba(5,5,7,0.8) 100%);
            z-index: -1;
        }

        /* ==========================================================================
           HYBRID ADAPTIVE SITE NAVIGATION HEADER
           ========================================================================== */
        header.navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 6%;
            border-bottom: 1px solid var(--border-light);
            background: rgba(5, 5, 7, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
        }
        .navbar-emblem {
            width: 52px;         
            height: 52px;
            object-fit: contain; 
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }
        .logo:hover .navbar-emblem {
            transform: scale(1.12); 
        }
        .logo h3 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; text-transform: uppercase; }
        .logo h3 span { color: var(--primary-red); }
        .logo span { display: block; font-size: 0.6rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
        
        nav.links {
            display: flex;
            align-items: center;
        }
        nav.links a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 600;
            margin-left: 1.5rem;
            padding: 0.6rem 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
        }
        nav.links a:hover { border-color: var(--primary-red); color: var(--primary-red); background: rgba(255, 59, 66, 0.05); }

        .nav-hamburger {
            display: none;
            font-size: 1.5rem;
            color: var(--text-white);
            cursor: pointer;
        }

        /* ==========================================================================
           SUB-PAGES CARD WORKSPACE INTERFACE ENGINE[cite: 8]
           ========================================================================== */
        .page-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1.5rem 5rem;
            position: relative;
            z-index: 10;
        }
        .page-head {
            text-align: center;
            margin-bottom: 3rem;
        }
        .page-head h1 {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-top: 0.5rem;
        }
        .page-head .eyebrow {
            color: var(--primary-red-hover);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.8rem;
        }
        .page-head p {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-top: 0.5rem;
        }

        form.card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .field {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .field label {
            display: block;
            font-weight: 600;
            font-size: .82rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: .6rem;
            letter-spacing: 0.05em;
        }
        .field input, .field select {
            width: 100%;
            padding: 0.9rem 1.1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: #fff;
            font-family: var(--font-body);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }
        .field input:focus, .field select:focus {
            border-color: var(--primary-red);
            box-shadow: 0 0 0 3px rgba(255, 59, 66, 0.15);
        }
        .row2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .checkline {
            display: flex;
            gap: .7rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: .9rem;
            margin: 1.8rem 0;
            align-items: flex-start;
            cursor: pointer;
        }
        .checkline input {
            width: auto;
            margin-top: 0.25rem;
            accent-color: var(--primary-red);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary-red);
            color: #ffffff;
            border: none;
            padding: 1.1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            font-family: var(--font-body);
            box-shadow: 0 8px 25px rgba(255, 59, 66, 0.25);
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            background: var(--primary-red-hover);
            transform: translateY(-2px);
        }

        .status-msg { margin-top: 1.5rem; padding: 1rem; border-radius: 10px; text-align: center; font-weight: 500; display: none; }
        .status-msg.show { display: block; }
        .status-msg.ok { color: #26e67e; background: rgba(38, 230, 126, 0.1); border: 1px solid rgba(38, 230, 126, 0.3); }
        .status-msg.err { color: #ff4d55; background: rgba(255, 77, 85, 0.1); border: 1px solid rgba(255, 77, 85, 0.3); }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            border-top: 1px solid var(--border-light);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 600;
            margin-top: 5rem;
        }

        /* ==========================================================================
           RESPONSIVE INTERFACE MEDIA OVERRIDES (PHONE COMPATIBILITY)
           ========================================================================== */
        @media (max-width: 820px) {
            .nav-hamburger { display: block; }
            nav.links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: rgba(5, 5, 7, 0.96);
                backdrop-filter: blur(30px);
                -webkit-backdrop-filter: blur(30px);
                padding: 1.5rem 0;
                border-bottom: 1px solid var(--border-light);
                gap: 1rem;
            }
            nav.links.show-menu { display: flex; }
            nav.links a { margin: 0; width: 85%; text-align: center; }
        }

        @media (max-width: 650px) {
            header.navbar { padding: 1.2rem 1.5rem; }
            form.card { padding: 2rem 1.2rem; }
            .row2 { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="static-image-backdrop">
        <img src="find.png" alt="Backdrop Element">
    </div>
    <div class="video-overlay"></div>

    <!-- ================= NAVIGATION HEADER ================= -->
    <header class="navbar">
        <div class="logo">
            <img src="finallogo.png" alt="SMYM Chirakkadavu Emblem Logo" class="navbar-emblem">
            <div>
                <h3><a href="index.html" style="text-decoration:none; color:inherit;">aima</a></h3>
                <span>SMYM Chirakkadavu</span>
            </div>
        </div>
        <div class="nav-hamburger" onclick="toggleMobileNavigation()"><i class="fa-solid fa-bars"></i></div>
        <nav class="links" id="navLinks">
            <a href="register.html">Become a Donor</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <!-- ================= REGISTRATION CONTAINER ================= -->
    <div class="page-wrap">
      <div class="page-head">
        <div class="eyebrow">Voluntary Donor Registration</div>
        <h1>Become a lifesaver</h1>
        <p>Fill in your details below to become a vital part of our emergency network.</p>
      </div>

      <form class="card" id="donorForm">
        <div class="field">
          <label for="full_name">Full Name *</label>
          <input type="text" id="full_name" required placeholder="e.g. Anjali Suresh">
        </div>

        <div class="row2">
          <div class="field">
            <label for="blood_group">Blood Group *</label>
            <select id="blood_group" required></select>
          </div>
          <div class="field">
            <label for="availability">Availability *</label>
            <select id="availability" required>
              <option value="Available">Available</option>
              <option value="Not Available">Not Available</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="mobile">Mobile Number *</label>
          <input type="tel" id="mobile" required placeholder="9876543210">
        </div>

        <div class="row2">
          <div class="field">
            <label for="country">Country *</label>
            <input type="text" id="country" required value="India">
          </div>
          <div class="field">
            <label for="state">State *</label>
            <input type="text" id="state" required value="Kerala">
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="district">District *</label>
            <input type="text" id="district" placeholder="e.g. Kottayam" value="Kottayam">
          </div>
          <div class="field">
            <label for="city">City / Town *</label>
            <input type="text" id="city" required placeholder="e.g. Chirakkadavu">
          </div>
        </div>

        <div class="field">
          <label for="email">E-Mail ID</label>
          <input type="email" id="email" placeholder="you@example.com">
        </div>

        <label class="checkline">
          <input type="checkbox" id="consent" required>
          <span>I authorise this website to display my name and number during emergency blood request procedures.</span>
        </label>

        <button type="submit" class="btn-submit">Register as Donor</button>
        <div class="status-msg" id="statusMsg"></div>
      </form>
    </div>

    <footer>
        managed by smym chirakkadavu
    </footer>

    <!-- Core Database Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    const SUPABASE_URL = "https://xpqeatcwykuqytcxbxmb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_3m4Jq_qdtj761DqiUvYidA_KSemQn_K";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const BLOOD_GROUPS = ["A+", "A-", "B+", "B-", "AB+", "AB-", "O+", "O-"];

    (function populateDropdown() {
        const selectEl = document.getElementById("blood_group");
        if (!selectEl) return;
        selectEl.innerHTML = "";
        BLOOD_GROUPS.forEach(bg => {
            const opt = document.createElement("option");
            opt.value = bg; opt.textContent = bg; selectEl.appendChild(opt);
        });
    })();

    function toggleMobileNavigation() {
        document.getElementById("navLinks").classList.toggle("show-menu");
    }

    function showStatus(element, message, isOk) {
        element.textContent = message;
        element.className = "status-msg show " + (isOk ? "ok" : "err");
    }

    document.getElementById("donorForm").addEventListener("submit", async (e)=>{
      e.preventDefault();
      const statusMsg = document.getElementById("statusMsg");
      const submitBtn = e.target.querySelector(".btn-submit");
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const payload = {
        full_name: document.getElementById("full_name").value.trim(),
        blood_group: document.getElementById("blood_group").value,
        availability: document.getElementById("availability").value,
        mobile: document.getElementById("mobile").value.trim(),
        country: document.getElementById("country").value.trim(),
        state: document.getElementById("state").value.trim(),
        district: document.getElementById("district").value.trim(),
        city: document.getElementById("city").value.trim(),
        email: document.getElementById("email").value.trim() || null,
      };

      const { error } = await supabaseClient.from("donors").insert([payload]);

      submitBtn.disabled = false;
      submitBtn.textContent = "Register as Donor";

      if(error){
        showStatus(statusMsg, "Something went wrong: " + error.message, false);
      }else{
        showStatus(statusMsg, "🎉 Thank you! You're registered as a blood donor.", true);
        e.target.reset();
        
        const selectEl = document.getElementById("blood_group");
        selectEl.innerHTML = "";
        BLOOD_GROUPS.forEach(bg => {
            const opt = document.createElement("option");
            opt.value = bg; opt.textContent = bg; selectEl.appendChild(opt);
        });
      }
    });
    </script>
</body>
</html>
